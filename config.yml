backend:
  name: git-gateway
  branch: main

media_folder: "imagenes"
public_folder: "/imagenes"

collections:
  - name: "notas"
    label: "Notas"
    folder: "_notas"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Fecha", name: "fecha", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - label: "Tipo"
        name: "tipo"
        widget: "select"
        options:
          - { label: "Texto", value: "texto" }
          - { label: "Historieta / Imagen", value: "imagen" }
          - { label: "Mezcla", value: "mezcla" }
          - { label: "Link comentado", value: "link" }
      - { label: "Imagen destacada", name: "imagen", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }
      - { label: "URL del link (solo si es tipo Link)", name: "url_link", widget: "string", required: false }
      - { label: "Texto del link", name: "texto_link", widget: "string", required: false }

  - name: "lanzamientos"
    label: "Lanzamientos"
    folder: "_lanzamientos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título (en caracteres latinos)", name: "titulo", widget: "string" }
      - { label: "Título en ídish (opcional)", name: "titulo_idish", widget: "string", required: false }
      - { label: "Artista", name: "artista", widget: "string" }
      - { label: "Descripción", name: "descripcion", widget: "text" }
      - { label: "Tapa del disco", name: "tapa", widget: "image" }
      - { label: "URL de Bandcamp", name: "bandcamp_url", widget: "string" }
      - { label: "¿Hay reseña?", name: "hay_resena", widget: "boolean", default: false }
      - { label: "Reseña (si la hay)", name: "resena", widget: "markdown", required: false }
      - { label: "Orden (número, el menor aparece primero)", name: "orden", widget: "number", default: 1 }
